<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Farmlytics</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="auth-body">

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-container" id="flashContainer">
      {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}">
          <span>{{ msg }}</span>
          <button onclick="this.parentElement.remove()" class="flash-close">&times;</button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon lg">F</div>
      <h1>Farmlytics</h1>
      <p>Retail Price Intelligence Platform</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">
            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" name="remember" id="remember" />
          <span class="checkmark"></span>
          Remember me
        </label>
        <a href="{{ url_for('auth.forgot_password') }}" class="link-subtle">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <p class="auth-hint">Default admin: <strong>admin@farmlytics.com</strong> / <strong>Admin@1234</strong></p>
  </div>

  <div class="auth-bg">
    <div class="auth-bg-shapes">
      <div class="shape s1"></div>
      <div class="shape s2"></div>
      <div class="shape s3"></div>
    </div>
  </div>
</div>

<button class="theme-toggle floating" id="themeToggle" aria-label="Toggle theme">
  <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script>
  // Password toggle
  const pwToggle = document.getElementById('pwToggle');
  const pwInput = document.getElementById('password');
  if (pwToggle) {
    pwToggle.addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      pwToggle.querySelector('.eye-open').style.display = isText ? '' : 'none';
      pwToggle.querySelector('.eye-closed').style.display = isText ? 'none' : '';
    });
  }
  setTimeout(() => { document.getElementById('flashContainer')?.remove(); }, 5000);
</script>
</body>
</html>
