<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account – Farmlytics</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="auth-body">

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-container" id="flashContainer">
      {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}">
          <span>{{ msg }}</span>
          <button onclick="this.parentElement.remove()" class="flash-close">&times;</button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<div class="auth-container centered">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon lg">F</div>
      <h1>Create Account</h1>
      <p>Sign up with your Gmail, Outlook, Yahoo, or any email</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required autocomplete="name" />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@gmail.com / you@outlook.com" required autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="At least 8 characters" required autocomplete="new-password" />
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">
            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required autocomplete="new-password" />
      </div>

      <button type="submit" class="btn btn-primary btn-full">Create Account &amp; Send Verification</button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-muted);">
      Already have an account? <a href="{{ url_for('auth.login') }}" class="link-subtle">Sign in</a>
    </p>
  </div>
</div>

<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script>
  const pwToggle = document.getElementById('pwToggle');
  const pwInput = document.getElementById('password');
  if (pwToggle) {
    pwToggle.addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      pwToggle.querySelector('.eye-open').style.display = isText ? '' : 'none';
      pwToggle.querySelector('.eye-closed').style.display = isText ? 'none' : '';
    });
  }
  setTimeout(() => { document.getElementById('flashContainer')?.remove(); }, 6000);
</script>
</body>
</html>
