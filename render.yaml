services:
  - type: web
    name: farmlytics
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: 3.11.9
